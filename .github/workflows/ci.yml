name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "ruff==0.11.4"
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install -e shared/
          pip install -e services/ingestion/
          pip install -e services/etl/
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short || echo "No unit tests yet"

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Create .env for build
        run: cp .env.example .env || true
      - name: Build inference image
        run: docker build -f services/inference/Dockerfile -t helix-inference:${{ github.sha }} .
      - name: Build mlflow image
        run: docker build -f infrastructure/mlflow/Dockerfile -t helix-mlflow:${{ github.sha }} infrastructure/mlflow/
