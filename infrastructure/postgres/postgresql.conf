# =============================================================================
# Helix — PostgreSQL Tuning Configuration
# Tuned for a machine with ~16GB RAM. Adjust shared_buffers if you have less.
# =============================================================================

# Memory
shared_buffers = 256MB
work_mem = 16MB
maintenance_work_mem = 64MB
effective_cache_size = 512MB

# Write-ahead log
wal_level = replica
checkpoint_completion_target = 0.9
wal_buffers = 16MB

# Query planner (SSD-optimised)
random_page_cost = 1.1
effective_io_concurrency = 200

# Connections
listen_addresses = '*'
max_connections = 100

# Logging — stderr so Docker captures it for Promtail/Loki
log_timezone = 'UTC'
log_min_duration_statement = 1000
log_line_prefix = '%t [%p] %u@%d '
log_destination = 'stderr'
logging_collector = off

# Locale
timezone = 'UTC'
datestyle = 'iso, mdy'
