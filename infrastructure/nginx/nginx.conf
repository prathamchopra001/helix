events {
    worker_connections 1024;
}

http {

    # -------------------------------------------------------------------------
    # Logging — JSON format for Promtail/Loki ingestion
    # -------------------------------------------------------------------------
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"correlation_id":"$http_x_correlation_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # -------------------------------------------------------------------------
    # Correlation ID — generate if not present in the incoming request
    # -------------------------------------------------------------------------
    map $http_x_correlation_id $correlation_id {
        default $http_x_correlation_id;
        ""      $request_id;
    }

    # -------------------------------------------------------------------------
    # Upstream services
    # Add airflow (Phase 3), inference (Phase 7) when ready
    # -------------------------------------------------------------------------
    upstream mlflow    { server mlflow:5000; }
    upstream grafana   { server grafana:3000; }
    upstream airflow   { server airflow-webserver:8080; }
    upstream inference { server inference:8000; }
    upstream frontend  { server frontend:8501; }

    # -------------------------------------------------------------------------
    # Main server block
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name localhost;

        proxy_set_header X-Correlation-ID $correlation_id;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;

        # MLflow tracking server
        location /mlflow/ {
            proxy_pass http://mlflow/;
        }

        # MinIO console — access directly at http://localhost:9001 (sub-path proxying unsupported)

        # Grafana dashboards — no trailing slash: Nginx passes /grafana/... unchanged to Grafana
        location /grafana/ {
            proxy_pass         http://grafana;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # Airflow UI — Add airflow (Phase 3)
        location /airflow/ {
            proxy_pass         http://airflow/airflow/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # Inference API
        location /api/ {
            proxy_pass         http://inference/;
            proxy_http_version 1.1;
            proxy_read_timeout 30s;
        }

        # Streamlit demo frontend
        location /frontend {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400s;
        }

        # Health check for Nginx itself
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}
